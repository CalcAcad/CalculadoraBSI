<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora BSI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    .checkbox {
      display: flex;
      align-items: center;
      margin-top: 15px;
      gap: 10px;
    }

    .checkbox input {
      width: auto;
      transform: scale(1.2);
    }

    .checkbox label {
      margin: 0;
      font-weight: normal;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #007BFF;
      color: white;
      border: none;
      font-size: 18px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      text-align: center;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 15px;
      }

      h2 {
        font-size: 20px;
      }

      button {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Calculadora BSI</h2>

  <label>Idade</label>
  <input type="number" id="idade">

  <label>IMC</label>
  <input type="number" step="0.1" id="imc">

  <label>VEF1 (% previsto)</label>
  <input type="number" id="fev1">

  <label>Internação últimos 2 anos</label>
  <select id="internacao">
    <option value="nao">Não</option>
    <option value="sim">Sim</option>
  </select>

  <label>Exacerbações por ano</label>
  <input type="number" id="exacerbacoes">

  <label>MRC Dispneia</label>
  <select id="mrc">
    <option value="0">0-2</option>
    <option value="3">3</option>
    <option value="4">4</option>
  </select>

  <label>Colonização</label>
  <select id="colonizacao">
    <option value="nenhuma">Nenhuma</option>
    <option value="outras">Outras bactérias</option>
    <option value="pseudomonas">Pseudomonas</option>
  </select>

  <label>Número de lobos acometidos</label>
  <input type="number" id="lobos">

  <div class="checkbox">
    <input type="checkbox" id="cistico">
    <label for="cistico">Doença cística</label>
  </div>

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>

</div>

<script>
function calcular() {
  let score = 0;

  let idade = Number(document.getElementById("idade").value);
  let imc = Number(document.getElementById("imc").value);
  let fev1 = Number(document.getElementById("fev1").value);
  let internacao = document.getElementById("internacao").value;
  let exacerbacoes = Number(document.getElementById("exacerbacoes").value);
  let mrc = Number(document.getElementById("mrc").value);
  let colonizacao = document.getElementById("colonizacao").value;
  let lobos = Number(document.getElementById("lobos").value);
  let cistico = document.getElementById("cistico").checked;

  // Idade
  if (idade >= 80) score += 6;
  else if (idade >= 70) score += 4;
  else if (idade >= 50) score += 2;

  // IMC
  if (imc > 0 && imc < 18.5) score += 2;

  // VEF1
  if (fev1 < 30) score += 3;
  else if (fev1 < 50) score += 2;
  else if (fev1 <= 80) score += 1;

  // Internação
  if (internacao === "sim") score += 5;

  // Exacerbações
  if (exacerbacoes >= 3) score += 2;

  // MRC
  if (mrc === 4) score += 3;
  else if (mrc === 3) score += 2;

  // Colonização
  if (colonizacao === "pseudomonas") score += 3;
  else if (colonizacao === "outras") score += 1;

  // Radiologia
  if (lobos >= 3 || cistico) score += 1;

  // Classificação
  let classificacao = "";
  if (score <= 4) classificacao = "Leve";
  else if (score <= 8) classificacao = "Moderada";
  else classificacao = "Grave";

  document.getElementById("resultado").innerHTML =
    "<h3>Score: " + score + "</h3>" +
    "<h2>Classificação: " + classificacao + "</h2>";
}
</script>

</body>
</html>
